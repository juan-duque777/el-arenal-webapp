<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Menú - El Arenal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.0/flowbite.min.css" rel="stylesheet" />
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F4F2EF] text-gray-800 font-sans">

    <nav class="md:hidden bg-white border-b border-gray-200 px-4 py-3 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-3">
            <img src="./img/logo.png" onerror="this.src='https://via.placeholder.com/40'" class="w-10 h-10 rounded-full shadow-sm" alt="Logo">
            <span class="font-bold text-[#61161D] text-lg">Admin Arenal</span>
        </div>
        <button data-drawer-target="sidebar-multi-level-sidebar" data-drawer-toggle="sidebar-multi-level-sidebar" aria-controls="sidebar-multi-level-sidebar" type="button" class="p-2 text-[#61161D] rounded-lg hover:bg-gray-100 focus:outline-none">
            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path clip-rule="evenodd" fill-rule="evenodd" d="M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zm0 10.5a.75.75 0 01.75-.75h7.5a.75.75 0 010 1.5h-7.5a.75.75 0 01-.75-.75zM2 10a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 10z"></path></svg>
        </button>
    </nav>

    <aside id="sidebar-multi-level-sidebar" class="fixed top-0 left-0 z-50 w-64 h-screen transition-transform -translate-x-full md:translate-x-0 bg-[#61161D] text-white shadow-2xl" aria-label="Sidebar">
        <div class="h-full px-4 py-6 overflow-y-auto flex flex-col justify-between no-scrollbar">
            <div>
                <div class="flex items-center gap-3 mb-10 px-2">
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg p-1">
                        <img src="./img/logo.png" onerror="this.src='https://via.placeholder.com/40'" class="rounded-full" alt="Logo">
                    </div>
                    <span class="text-xl font-bold tracking-wide uppercase">El Arenal</span>
                </div>

                <ul class="space-y-3 font-medium">
                    <li>
                        <a href="/admin" class="flex items-center p-3 text-white/70 rounded-xl hover:bg-white/10 hover:text-white transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                            <span class="ms-3">Panel Principal</span>
                        </a>
                    </li>
                    <li>
                        <a href="/admin-menu" class="flex items-center p-3 text-white rounded-xl bg-white/10 border-l-4 border-[#C28B16] shadow-inner transition-all">
                            <svg class="w-5 h-5 text-[#C28B16]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                            <span class="ms-3 font-bold">Menú / Platos</span>
                        </a>
                    </li>
                    <li>
                        <a href="/admin-reservas" class="flex items-center p-3 text-white/70 rounded-xl hover:bg-white/10 hover:text-white transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span class="ms-3">Reservas</span>
                            <span id="badgeReservas" class="inline-flex items-center justify-center w-5 h-5 ms-3 text-xs font-bold text-[#61161D] bg-[#C28B16] rounded-full shadow-md">0</span>
                        </a>
                    </li>
                    <li>
                        <a href="/admin-opiniones" class="flex items-center p-3 text-white/70 rounded-xl hover:bg-white/10 hover:text-white transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                            <span class="ms-3">Opiniones</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="border-t border-white/20 pt-4">
                <a href="/login" class="flex items-center p-3 text-white/70 rounded-xl hover:bg-red-500/20 hover:text-red-300 transition group">
                    <svg class="w-5 h-5 group-hover:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span class="ms-3 font-semibold">Cerrar Sesión</span>
                </a>
            </div>
        </div>
    </aside>

    <div class="p-4 md:ml-64 min-h-screen">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 fade-in px-2 mt-4">
            <div>
                <h1 class="text-3xl font-extrabold text-[#61161D]">Catálogo de Platos</h1>
                <p class="text-sm text-gray-500 mt-1">Administra los productos visibles para tus clientes.</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" class="block w-full pl-10 p-3 text-sm text-gray-900 border border-gray-200 rounded-xl bg-white shadow-sm focus:ring-[#D94D1A] outline-none" placeholder="Buscar plato...">
                </div>
                <button data-modal-target="crud-modal" data-modal-toggle="crud-modal" class="bg-gradient-to-r from-[#D94D1A] to-[#b53c15] text-white hover:shadow-lg hover:shadow-orange-500/40 px-5 py-3 rounded-xl font-bold transition-all shadow-sm flex items-center justify-center gap-2 active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                    Nuevo Plato
                </button>
            </div>
        </header>

        <div class="bg-white rounded-3xl shadow-md border border-gray-100 overflow-hidden fade-in" style="animation-delay: 0.1s;">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="font-bold text-gray-700 text-lg flex items-center gap-2">
                    🍽️ Listado Activo
                </h2>
            </div>

            <div class="hidden md:block overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-500 uppercase bg-white border-b border-gray-100">
                        <tr>
                            <th scope="col" class="px-6 py-4 font-bold">Producto</th>
                            <th scope="col" class="px-6 py-4 font-bold">Categoría</th>
                            <th scope="col" class="px-6 py-4 font-bold">Precio</th>
                            <th scope="col" class="px-6 py-4 font-bold">Estado</th>
                            <th scope="col" class="px-6 py-4 text-right font-bold">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaPlatosBody" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>

            <div id="contenedorTarjetasMovil" class="md:hidden grid grid-cols-1 divide-y divide-gray-100">
                </div>
        </div>
    </div>

    <div id="crud-modal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full bg-black/50 backdrop-blur-sm transition-opacity">
        <div class="relative p-4 w-full max-w-lg max-h-full">
            <div class="relative bg-white rounded-3xl shadow-2xl border border-gray-100">
                <div class="flex items-center justify-between p-5 border-b border-gray-100 rounded-t-3xl bg-gray-50">
                    <h3 class="text-xl font-extrabold text-[#61161D]">
                        Añadir Nuevo Plato
                    </h3>
                    <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-xl text-sm w-8 h-8 ms-auto inline-flex justify-center items-center transition" data-modal-toggle="crud-modal">
                        <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                        </svg>
                        <span class="sr-only">Cerrar modal</span>
                    </button>
                </div>
                <form id="formNuevoPlato" class="p-5 md:p-6 space-y-4">
                    <div class="grid gap-4 mb-4 grid-cols-2">
                        <div class="col-span-2">
                            <label class="block mb-2 text-sm font-bold text-gray-900">Nombre del Plato</label>
                            <input type="text" id="nombrePlato" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-[#D94D1A] focus:border-[#D94D1A] block w-full p-3 outline-none" placeholder="Ej. Sancocho de Bagre" required>
                        </div>
                        <div class="col-span-2 sm:col-span-1">
                            <label class="block mb-2 text-sm font-bold text-gray-900">Precio (COP)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                                    <span class="text-gray-500 font-bold text-sm">$</span>
                                </div>
                                <input type="number" id="precioPlato" name="precio" min="0" step="50" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-[#D94D1A] focus:border-[#D94D1A] block w-full ps-9 p-3 shadow-sm transition-colors outline-none" placeholder="Ej: 35000" required>
                            </div>
                        </div>
                        <div class="col-span-2 sm:col-span-1">
                            <label class="block mb-2 text-sm font-bold text-gray-900">Categoría</label>
                            <select id="categoriaPlato" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-[#D94D1A] focus:border-[#D94D1A] block w-full p-3 outline-none" required>
                                <option value="" disabled selected>Seleccione una categoría</option>
                                <option value="Pescados">Pescados</option>
                                <option value="Carnes">Carnes</option>
                                <option value="Cazuelas">Cazuelas</option>
                                <option value="Arroces">Arroces</option>
                                <option value="Bebidas">Bebidas</option>
                                <option value="Adicionales">Adicionales</option>
                            </select>
                        </div>
                        <div class="col-span-2">
                            <label class="block mb-2 text-sm font-bold text-gray-900">Descripción para el cliente</label>
                            <textarea id="descripcionPlato" rows="3" class="block p-3 w-full text-sm text-gray-900 bg-gray-50 rounded-xl border border-gray-200 focus:ring-[#D94D1A] focus:border-[#D94D1A] outline-none resize-none" placeholder="Ingredientes, preparación, etc..."></textarea>                    
                        </div>
                        
                        <div class="col-span-2">
                            <label class="block mb-2 text-sm font-bold text-gray-900">Foto del Plato</label>
                            <input name="imagen" id="imagenPlato" class="block w-full text-sm text-gray-500 border border-gray-200 rounded-xl cursor-pointer bg-gray-50 focus:outline-none file:mr-4 file:py-3 file:px-4 file:rounded-l-xl file:border-0 file:text-sm file:font-semibold file:bg-[#E3E0DB] file:text-[#61161D] hover:file:bg-gray-200" type="file" accept="image/*">
                        </div>
                    </div>
                    <button type="submit" class="text-white inline-flex items-center bg-[#268C79] hover:bg-[#1e7061] focus:ring-4 focus:outline-none focus:ring-green-300 font-bold rounded-xl text-sm px-5 py-3 text-center transition-all w-full justify-center mt-2 shadow-md active:scale-95">
                        <svg class="me-1 -ms-1 w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd"></path></svg>
                        Guardar Plato en el Menú
                    </button>
                </form>
            </div>
        </div>
    </div>
    <button id="btnAbrirEditModal" data-modal-target="edit-modal" data-modal-toggle="edit-modal" class="hidden"></button>

    <div id="edit-modal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full bg-black/50 backdrop-blur-sm transition-opacity">
        <div class="relative p-4 w-full max-w-lg max-h-full">
            <div class="relative bg-white rounded-3xl shadow-2xl border border-gray-100">
                <div class="flex items-center justify-between p-5 border-b border-gray-100 rounded-t-3xl bg-blue-50">
                    <h3 class="text-xl font-extrabold text-blue-900">
                        ✏️ Editar Plato
                    </h3>
                    <button id="btnCerrarEditModal" type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-xl text-sm w-8 h-8 ms-auto inline-flex justify-center items-center transition" data-modal-hide="edit-modal">
                        <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                        </svg>
                        <span class="sr-only">Cerrar modal</span>
                    </button>
                </div>
                <form id="formEditarPlato" class="p-5 md:p-6 space-y-4">
                    <div class="grid gap-4 mb-4 grid-cols-2">
                        <div class="col-span-2">
                            <label class="block mb-2 text-sm font-bold text-gray-900">Nombre del Plato</label>
                            <input type="text" id="editNombrePlato" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full p-3 outline-none" required>
                        </div>
                        <div class="col-span-2 sm:col-span-1">
                            <label class="block mb-2 text-sm font-bold text-gray-900">Precio (COP)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                                    <span class="text-gray-500 font-bold text-sm">$</span>
                                </div>
                                <input type="number" id="editPrecioPlato" name="precio" min="0" step="50" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full ps-9 p-3 shadow-sm transition-colors outline-none" placeholder="Ej: 35000" required>
                            </div>
                        </div>
                        <div class="col-span-2 sm:col-span-1">
                            <label class="block mb-2 text-sm font-bold text-gray-900">Categoría</label>
                            <select id="editCategoriaPlato" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full p-3 outline-none" required>
                                <option value="" disabled selected>Seleccione una categoría</option>
                                <option value="Pescados">Pescados</option>
                                <option value="Carnes">Carnes</option>
                                <option value="Cazuelas">Cazuelas</option>
                                <option value="Arroces">Arroces</option>
                                <option value="Bebidas">Bebidas</option>
                                <option value="Adicionales">Adicionales</option>
                            </select>
                        </div>
                        <div class="col-span-2">
                            <label class="block mb-2 text-sm font-bold text-gray-900">Descripción para el cliente</label>
                            <textarea id="editDescripcionPlato" rows="3" class="block p-3 w-full text-sm text-gray-900 bg-gray-50 rounded-xl border border-gray-200 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none"></textarea>                    
                        </div>

                        <div class="col-span-2">
                            <label class="block mb-2 text-sm font-bold text-gray-900">Foto Actual / Actualizar (Opcional)</label>
                            <div class="flex items-center gap-4 mb-3">
                                <img id="editImagenActual" src="" alt="Foto del plato" class="w-16 h-16 object-cover rounded-xl border border-gray-200 shadow-sm">
                                <input id="editImagenPlato" class="block w-full text-sm text-gray-500 border border-gray-200 rounded-xl cursor-pointer bg-gray-50 focus:outline-none file:mr-4 file:py-3 file:px-4 file:rounded-l-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200" type="file" accept="image/*">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="text-white inline-flex items-center bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-bold rounded-xl text-sm px-5 py-3 text-center transition-all w-full justify-center mt-2 shadow-md active:scale-95">
                        <svg class="me-2 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Actualizar Información
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.0/flowbite.min.js"></script>
    <script src="./js/admin-menu.js"></script>
    <script src="/js/admin-global.js"></script>
</body>
</html>
